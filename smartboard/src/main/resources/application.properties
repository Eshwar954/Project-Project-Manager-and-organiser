spring.application.name=smartboard

# ── Database (H2 in-memory) ──────────────────────────────────────────────────
spring.datasource.url=jdbc:h2:mem:smartboard;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=
spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.show-sql=false
spring.jpa.open-in-view=false

# ── H2 Console (dev only) ────────────────────────────────────────────────────
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console

# ── Server ───────────────────────────────────────────────────────────────────
server.port=8080

# ── JWT ──────────────────────────────────────────────────────────────────────
app.jwt.secret=projectboard-secure-jwt-signing-key-32chars!!
app.jwt.expiry-ms=86400000

# ── Logging ──────────────────────────────────────────────────────────────────
logging.level.com.smartboard=INFO
logging.level.org.springframework.security=WARN